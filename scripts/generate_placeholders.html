<!DOCTYPE html>
<html>
<head>
    <title>Generate Placeholder Images</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .placeholder { 
            display: inline-block; 
            margin: 10px; 
            text-align: center; 
            border: 1px solid #ccc; 
            padding: 10px; 
        }
        canvas { border: 1px solid #ddd; }
    </style>
</head>
<body>
    <h1>Team Member Placeholder Images</h1>
    <div id="team-placeholders"></div>
    
    <h1>Company Logo Placeholders</h1>
    <div id="logo-placeholders"></div>

    <script>
        const teamMembers = [
            'parshant-jain', 'paolo-narciso', 'suruchi-kothari', 'abbey-vandersall',
            'james-mccoy', 'adam-bleibtreu', 'janhvi-patel'
        ];
        
        const companies = [
            'mckinsey', 'simplify-reality', 'medarcus', 'doctor-insta',
            'aarp', 'cloud-health', 'ignite-tek', '531-networks',
            'stanford', 'imperial-college', 'medtronic', 'digital-surgery',
            'agilon-health', 'bain', 'columbia', 'amsurg', 'envision',
            'census-bureau', 'smartbug', 'asgn', 'creative-circle',
            'cvs-health', 'ibm', 'cota', 'duke'
        ];

        function generateTeamPlaceholder(name) {
            const canvas = document.createElement('canvas');
            canvas.width = 120;
            canvas.height = 120;
            const ctx = canvas.getContext('2d');
            
            // Background
            ctx.fillStyle = '#4F46E5';
            ctx.fillRect(0, 0, 120, 120);
            
            // Text
            ctx.fillStyle = 'white';
            ctx.font = 'bold 14px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(name.split('-')[0].toUpperCase(), 60, 50);
            ctx.fillText(name.split('-')[1]?.toUpperCase() || '', 60, 70);
            
            const div = document.createElement('div');
            div.className = 'placeholder';
            div.innerHTML = `<p>${name}.jpg</p>`;
            div.appendChild(canvas);
            
            // Download link
            const link = document.createElement('a');
            link.href = canvas.toDataURL();
            link.download = `${name}.jpg`;
            link.textContent = 'Download';
            link.style.display = 'block';
            link.style.marginTop = '5px';
            div.appendChild(link);
            
            return div;
        }

        function generateLogoPlaceholder(name) {
            const canvas = document.createElement('canvas');
            canvas.width = 80;
            canvas.height = 40;
            const ctx = canvas.getContext('2d');
            
            // Background
            ctx.fillStyle = '#f0f0f0';
            ctx.fillRect(0, 0, 80, 40);
            
            // Border
            ctx.strokeStyle = '#ccc';
            ctx.strokeRect(0, 0, 80, 40);
            
            // Text
            ctx.fillStyle = '#666';
            ctx.font = 'bold 10px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(name.toUpperCase(), 40, 25);
            
            const div = document.createElement('div');
            div.className = 'placeholder';
            div.innerHTML = `<p>${name}.png</p>`;
            div.appendChild(canvas);
            
            // Download link
            const link = document.createElement('a');
            link.href = canvas.toDataURL();
            link.download = `${name}.png`;
            link.textContent = 'Download';
            link.style.display = 'block';
            link.style.marginTop = '5px';
            div.appendChild(link);
            
            return div;
        }

        // Generate team placeholders
        const teamContainer = document.getElementById('team-placeholders');
        teamMembers.forEach(member => {
            teamContainer.appendChild(generateTeamPlaceholder(member));
        });

        // Generate logo placeholders
        const logoContainer = document.getElementById('logo-placeholders');
        companies.forEach(company => {
            logoContainer.appendChild(generateLogoPlaceholder(company));
        });
    </script>
</body>
</html>
